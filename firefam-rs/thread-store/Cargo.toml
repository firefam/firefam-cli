[package]
edition.workspace = true
license.workspace = true
name = "firefam-thread-store"
version.workspace = true

[lib]
name = "firefam_thread_store"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
firefam-git-utils = { workspace = true }
firefam-protocol = { workspace = true }
firefam-rollout = { workspace = true }
firefam-state = { workspace = true }
firefam-utils-path = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
uuid = { workspace = true }
