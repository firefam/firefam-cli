[build-system]
requires = ["hatchling>=1.24.0"]
build-backend = "hatchling.build"

[project]
name = "firefamai-firefam-cli-bin"
version = "0.131.0a4"
description = "Pinned Firefam CLI runtime for the Python SDK"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "FirefamAI" }]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
]

[project.urls]
Homepage = "https://github.com/firefam/firefam-cli"
Repository = "https://github.com/firefam/firefam-cli"
Issues = "https://github.com/firefam/firefam-cli/issues"

[tool.hatch.build]
exclude = [
  ".venv/**",
  ".pytest_cache/**",
  "dist/**",
  "build/**",
]

[tool.hatch.build.targets.wheel]
packages = ["src/firefam_cli_bin"]
include = ["src/firefam_cli_bin/bin/**"]

[tool.hatch.build.targets.wheel.hooks.custom]

[tool.hatch.build.targets.sdist]

[tool.hatch.build.targets.sdist.hooks.custom]

[tool.uv]
exclude-newer = "7 days"
index-strategy = "first-index"

[tool.uv.pip]
exclude-newer = "7 days"
index-strategy = "first-index"
