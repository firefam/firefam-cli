[package]
edition.workspace = true
license.workspace = true
name = "firefam-memories-extension"
version.workspace = true

[lib]
name = "firefam_memories_extension"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
firefam-core = { workspace = true }
firefam-extension-api = { workspace = true }
firefam-features = { workspace = true }
firefam-memories-read = { workspace = true }
firefam-tools = { workspace = true }
firefam-utils-absolute-path = { workspace = true }
firefam-utils-output-truncation = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["fs"] }

[dev-dependencies]
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["fs", "macros"] }
